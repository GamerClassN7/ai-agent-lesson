<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kalendář s eventy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <h1 class="header__title">Kalendář</h1>
    <div class="theme-switcher" role="group" aria-label="Výběr barevného schématu">
      <button class="theme-switcher__btn" data-theme="1" title="Schéma 1: Důvěra a klid" aria-label="Schéma 1: Důvěra a klid"></button>
      <button class="theme-switcher__btn" data-theme="2" title="Schéma 2: Energie a kreativita" aria-label="Schéma 2: Energie a kreativita"></button>
      <button class="theme-switcher__btn" data-theme="3" title="Schéma 3: Příroda a růst" aria-label="Schéma 3: Příroda a růst"></button>
    </div>
    <div class="theme-toggle">
      <button class="theme-toggle__button" title="Přepnout dark/light mód" aria-label="Přepnout dark/light mód">🌙</button>
    </div>
  </header>

  <main class="main-content">
    <section class="calendar">
      <div class="calendar__nav">
        <div class="calendar__nav-group">
          <button class="calendar__btn" id="prevMonth" aria-label="Předchozí">&#8249;</button>
          <button class="calendar__btn calendar__btn--today" id="todayBtn">Dnes</button>
          <button class="calendar__btn" id="nextMonth" aria-label="Další">&#8250;</button>
        </div>
        <h2 class="calendar__month-title" id="monthTitle"></h2>
        <div class="view-switcher" role="group" aria-label="Výběr pohledu kalendáře">
          <button class="view-switcher__button" data-view="weekly" title="Týdenní pohled" aria-label="Týdenní pohled">Týden</button>
          <button class="view-switcher__button" data-view="monthly" title="Měsíční pohled" aria-label="Měsíční pohled">Měsíc</button>
        </div>
      </div>

      <div class="calendar__grid">
        <div class="calendar__day-name">Po</div>
        <div class="calendar__day-name">Út</div>
        <div class="calendar__day-name">St</div>
        <div class="calendar__day-name">Čt</div>
        <div class="calendar__day-name">Pá</div>
        <div class="calendar__day-name calendar__day-name--weekend">So</div>
        <div class="calendar__day-name calendar__day-name--weekend">Ne</div>
      </div>

      <div class="calendar__days" id="calendarDays"></div>
    </section>

    <aside class="event-panel">
      <div class="event-search">
        <input type="search" class="event-search__input" id="eventSearch" placeholder="Hledat eventy v kalendáři…" aria-label="Hledat eventy" autocomplete="off">
        <div class="event-search__results" id="searchResults" hidden></div>
      </div>
      <h2 class="event-panel__title" id="selectedDateTitle">Eventy</h2>
      <div class="category-filter" id="categoryFilter"></div>
      <ul class="event-panel__list" id="eventList">
        <li class="event-panel__empty">Vyberte den pro zobrazení eventů.</li>
      </ul>
    </aside>
  </main>

  <script src="script.js"></script>
</body>
</html>
